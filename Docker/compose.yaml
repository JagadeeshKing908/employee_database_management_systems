version: "3.8"

services:
  db:
    image: mysql:8
    container_name: db
    environment:
      MYSQL_ROOT_PASSWORD: 123
      MYSQL_DATABASE: employeedb
    ports:
      - "3306:3306"

  app:
    build: .
    container_name: app
    ports:
      - "8080:8080"
    depends_on:
      - db
    restart: always   # 🔥 IMPORTANT
